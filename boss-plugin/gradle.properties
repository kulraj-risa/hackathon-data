# Toolchain / library versions (align with the BOSS host where noted).
kotlinVersion=2.1.0
composeVersion=1.7.3
serializationVersion=1.7.3
decomposeVersion=3.2.0

# GitHub Packages credentials for pulling the BOSS plugin-api.
# Prefer the GITHUB_ACTOR / GITHUB_TOKEN environment variables; otherwise set
# these here or in ~/.gradle/gradle.properties (do NOT commit a real token):
# gpr.user=your-github-username
# gpr.token=ghp_xxx_read_packages

org.gradle.jvmargs=-Xmx2g
kotlin.code.style=official
