name: Firebase Deployment

on:
  pull_request:
    types:
      - labeled # Trigger when a label is added to a PR

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event.label.name == 'deploy'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare Google Application Credentials
        run: |
          echo "${{ secrets.FIREBASE_TOKEN_PROD }}" | base64 --decode > google-application-credentials.json

      - name: Build & Deploy to Prod
        env:
          GOOGLE_APPLICATION_CREDENTIALS: google-application-credentials.json
          CI: "true"
          NODE_OPTIONS: "--no-warnings"
        run: |
          node deployWorkflow.js prod
          firebase use prod
          firebase deploy --only hosting:main

      - name: Build & Deploy to Demo
        env:
          GOOGLE_APPLICATION_CREDENTIALS: google-application-credentials.json
          CI: "false"
          NODE_OPTIONS: "--no-warnings"
        run: |
          npm run build:demo
          firebase use default
          firebase deploy --only hosting:demo

      - name: Clean up credentials
        if: always()
        run: rm -f google-application-credentials.json
